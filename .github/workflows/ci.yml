name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  test:
    name: PHP ${{ matrix.php }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4']
        os: [ubuntu-latest]
        include:
          - php: '8.3'
            os: ubuntu-latest
            primary: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: hash, mbstring
          coverage: ${{ matrix.primary && 'pcov' || 'none' }}
          tools: composer:v2

      - name: Validate composer.json
        run: composer validate --strict

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-php-${{ matrix.php }}-${{ hashFiles('**/composer.json') }}
          restore-keys: ${{ runner.os }}-php-${{ matrix.php }}-

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Run test suite
        if: ${{ ! matrix.primary }}
        run: vendor/bin/phpunit

      - name: Run test suite with coverage
        if: ${{ matrix.primary }}
        run: vendor/bin/phpunit --coverage-clover coverage.xml --coverage-text

      - name: Smoke-test CLI on fixtures
        run: bin/phpdup analyze tests/Fixtures --min-impact 5 --limit 3

      - name: Upload coverage to Codacy
        if: ${{ matrix.primary && env.CODACY_PROJECT_TOKEN != '' }}
        env:
          CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}
        run: |
          bash <(curl -Ls https://coverage.codacy.com/get.sh) report \
            -r coverage.xml \
            --commit-uuid $GITHUB_SHA

      - name: Upload coverage artifact
        if: ${{ matrix.primary }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.php }}
          path: coverage.xml

  static-analysis:
    name: Static analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: hash, mbstring
          coverage: none
          tools: composer:v2
      - run: composer install --no-interaction --no-progress --prefer-dist
      - name: Lint PHP files
        run: |
          find src tests -name "*.php" -print0 | xargs -0 -n1 -P4 php -l > /dev/null
